version: '3.9'

services:
  # NOTE: Ollama runs on host (localhost:11434)
  # AIOX Engine connects via OLLAMA_URL=http://host.docker.internal:11434

  # Redis - Cache Layer (24h TTL)
  redis:
    image: redis:7-alpine
    container_name: aiox-redis
    ports:
      - "6379:6379"
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_data:/data
    restart: always
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - aiox-network

  # Qdrant - Vector Memory DB
  qdrant:
    image: qdrant/qdrant:latest
    container_name: aiox-qdrant
    ports:
      - "6335:6333"
    environment:
      - QDRANT_API_KEY=aiox-secret-key
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always
    networks:
      - aiox-network

  # FastAPI Application
  aiox-api:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: aiox-api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_URL=http://172.17.0.1:11434
      - REDIS_URL=redis://redis:6379
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=aiox-secret-key
      - ENV=production
    depends_on:
      - redis
      - qdrant
    volumes:
      - ./api:/app/api
      - ./router:/app/router
      - ./cache:/app/cache
      - ./memory:/app/memory
    restart: always
    networks:
      - aiox-network
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

volumes:
  redis_data:
  qdrant_storage:

networks:
  aiox-network:
    driver: bridge
