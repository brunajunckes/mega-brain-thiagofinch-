version: '3.8'

services:
  bookme-web:
    image: bookme-web:latest
    container_name: bookme-web
    ports:
      - "3003:3000"
    environment:
      - NODE_ENV=production
    volumes:
      - bookme-data:/var/lib/bookme
      - bookme-projects:/var/lib/projects
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/api/books"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  bookme-data:
    driver: local
  bookme-projects:
    driver: local
